services:
  - type: web
    name: xpensetrack-backend
    env: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -Dserver.port=$PORT -jar target/xpensetrack-backend-1.0.0.jar
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 604800000
      - key: SERVER_PORT
        fromGroup: web
    healthCheckPath: /api/health/ping
